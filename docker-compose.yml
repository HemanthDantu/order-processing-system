services:
  postgres:
    image: postgres:16
    container_name: order-postgres
    restart: unless-stopped
    ports:
      # Host port 5433 maps to the container's default PostgreSQL port 5432.
      - "5433:5432"
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: orders_user
      POSTGRES_PASSWORD: orders_password
    volumes:
      - orders-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders_user -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  orders-postgres-data:
